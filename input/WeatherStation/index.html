<!DOCTYPE html>
    <head>
        <title>Weatherstation</title>
        <meta charset="utf-8">
        <meta http-equiv="cache-control" content="no-store">
        <meta name="author" content="Bastian Roth">
        <meta name="date" content="10.05.2026">
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
        <script src="main.js" defer></script>
    </head>
    <body>
        <svg id="back" viewBox="0 0 256 144" preserveAspectRatio="xMidYMid slice">
            
            <!-- Background during day mode -->
            <g id="day-sky">
                <defs>
                    <linearGradient id="daySkyGradient" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%"   stop-color="#87cefa"/>
                        <stop offset="100%" stop-color="#2554ca"/>
                    </linearGradient>
                </defs>

                <rect x="0" y="0" width="100%" height="100%" fill="url(#daySkyGradient)"/>

                <g id="sun">
                </g>
                
                <g id="clouds">
                    <g id="clouds-a">
                    </g>
                    <g id="clouds-b" transform="translate(256,0)">
                    </g>
                </g>
            </g>

            <!-- Background during night mode -->
            <g id="night-sky">
                <rect width="256" height="144" fill="#04044e"/>
                
                <g id="stars">
                </g>
                
                <g id="moon">
                </g>
            </g>
        </svg>

        <div id="headerbar">
            <h1 id="title">
                Weatherstation
            </h1>
        </div>
        
        <div id="navbar">
            <button id="nav-report" class="nav-opt">
                Current Weather
            </button>
            <button id="nav-trend"  class="nav-opt">
                Weather Trend
            </button>
        </div>

        <section id="weather-report">

            <h2 id="report-title">
                Current Metrics
            </h2>

            <div id="grid">
                <!-- Temperature -->
                <div class="metric">
                    <span class="label">Temperature</span>
                    <span class="value" id="temp-value"> </span>
                    <meter id="temp-meter" min="-20" max="50"></meter>
                    <div class="scale">
                        <span>-20°</span>
                        <span>50°</span>
                    </div>
                </div>

                <!-- Dewpoint -->
                <div class="metric">
                    <span class="label">Dewpoint</span>
                    <span class="value" id="dp-value"> </span>
                    <meter id="dp-meter" min="-20" max="50"></meter>
                    <div class="scale">
                        <span>-20°</span>
                        <span>50°</span>
                    </div>
                </div>

                <!-- Wetbulb -->
                <div class="metric">
                    <span class="label">Wetbulb</span>
                    <span class="value" id="wb-value"> </span>
                    <meter id="wb-meter" min="-20" max="50"></meter>
                    <div class="scale">
                        <span>-20°</span>
                        <span>50°</span>
                    </div>
                </div>

                <!-- Humidity -->
                <div class="metric">
                    <span class="label">Humidity</span>
                    <span class="value" id="hum-value"> </span>
                    <meter id="hum-meter" min="0" max="100"></meter>
                    <div class="scale">
                        <span>0%</span>
                        <span>100%</span>
                    </div>
                </div>

                <!-- Absolute humidity -->
                <div class="metric">
                    <span class="label">Absolute Humidity</span>
                    <span class="value" id="absHum-value"> </span>
                    <meter id="absHum-meter" min="0" max="50"></meter>
                    <div class="scale">
                        <span>0g</span>
                        <span>50g</span>
                    </div>
                </div>

                <!-- Pressure -->
                <div class="metric">
                    <span class="label">Pressure</span>
                    <span class="value" id="pres-value"> </span>
                    <meter id="pres-meter" min="900" max="1100"></meter>
                    <div class="scale">
                        <span>900</span>
                        <span>1100</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="weather-trend" hidden>

            <h2 id="trend-title">
                Weather Trend
            </h2>

            <div id="trend-box">
                <svg id="trend-graph" viewBox="0 0 128 40" preserveAspectRatio="none">

                    <text class="trend-scale" x="0.5" y="2"  font-size="1"> 40°</text>
                    <text class="trend-scale" x="0.5" y="10" font-size="1"> 30°</text>
                    <text class="trend-scale" x="0.5" y="18" font-size="1"> 20°</text>
                    <text class="trend-scale" x="0.5" y="26" font-size="1"> 10°</text>
                    <text class="trend-scale" x="1"   y="34" font-size="1">  0°</text>
                    <text class="trend-scale" x="0"   y="42" font-size="1">-10°</text>
                    
                    <line x1="0" y1="8"    x2="128"   y2="8"  stroke="rgba(255,255,255,0.2)" stroke-width="0.1"/>
                    <line x1="0" y1="16"   x2="128"   y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="0.1"/>
                    <line x1="0" y1="24"   x2="128"   y2="24" stroke="rgba(255,255,255,0.2)" stroke-width="0.1"/>
                    <line x1="0" y1="32"   x2="128"   y2="32" stroke="rgba(255,255,255,0.2)" stroke-width="0.1"/>
                    
                    <text class="trend-scale" x="125.5" y="2"  font-size="1">100%</text>
                    <text class="trend-scale" x="126"   y="10" font-size="1"> 80%</text>
                    <text class="trend-scale" x="126"   y="18" font-size="1"> 60%</text>
                    <text class="trend-scale" x="126"   y="26" font-size="1"> 40%</text>
                    <text class="trend-scale" x="126"   y="34" font-size="1"> 20%</text>
                    <text class="trend-scale" x="126.5" y="42" font-size="1">  0%</text>

                    <polyline id="trend-temp" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.25"/>
                    <polyline id="trend-hum"  fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.25"/>

                    <g id="trend-tooltips"></g>
                </svg>
            </div>
        </section>
    </body>
</html>
