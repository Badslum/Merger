<!DOCTYPE html>
    <head>
        <title>Weatherstation</title>
        <meta charset="utf-8">
        <meta http-equiv="cache-control" content="no-store">
        <meta name="author" content="Bastian Roth">
        <meta name="date" content="10.05.2026">
        <link rel="stylesheet" href="style.css">
        <script src="main.js" defer></script>
    </head>
    <body>
        <svg id="back"
            viewBox="0 0 256 144"
            preserveAspectRatio="xMidYMid slice">
            
            <!-- Background during day mode -->
            <g id="day-sky">
                <defs>
                    <linearGradient id="daySkyGradient"
                        x1="0"
                        y1="0"
                        x2="0"
                        y2="1">
                        <stop offset="0%"
                            stop-color="#87cefa"
                        />
                        <stop offset="100%"
                            stop-color="#2554ca"
                        />
                    </linearGradient>
                </defs>

                <rect x="0"
                    y="0"
                    width="100%"
                    height="100%"
                    fill="url(#daySkyGradient)" />

                <g id="sun">
                </g>
                <g id="clouds">
                    <g id="clouds-a">
                    </g>
                    <g id="clouds-b"
                        transform="translate(256,0)">
                    </g>
                </g>
            </g>

            <!-- Background during night mode -->
            <g id="night-sky">
                <rect width="256"
                    height="144"
                    fill="#04044e"
                />
                <g id="stars">
                    
                </g>
                <g id="moon">
                </g>
            </g>
        </svg>

        <div id="headerbar">
            <h1 id="title">
                Weatherstation
            </h1>
        </div>
        
        <div id="navbar">
            <button id="nav-report">
                Current Weather
            </button>
            <button id="nav-trend">
                Weather Trend
            </button>
        </div>

        <section id="weather-report"
            class="weather">

            <h2 id="report-title">
                Current Metrics
            </h2>

            <div id="grid">
                <!-- Temperature -->
                <div class="metric">
                    <span class="label">
                        Temperature
                    </span>
                    <meter id="temp-meter"
                        min="-20"
                        max="50">
                    </meter>
                    <span id="temp-value">
                    </span>
                </div>

                <!-- Dewpoint -->
                <div class="metric">
                    <span class="label">
                        Dewpoint
                    </span>
                    <meter id="dp-meter"
                        min="-20"
                        max="50">
                    </meter>
                    <span id="dp-value">
                    </span>
                </div>

                <!-- Humidity -->
                <div class="metric">
                    <span class="label">
                        Humidity
                    </span>
                    <meter id="hum-meter"
                        min="0"
                        max="100">
                    </meter>
                    <span id="hum-value">
                    </span>
                </div>

                <!-- Absolute humidity -->
                <div class="metric">
                    <span class="label">
                        Absolute humidity
                    </span>
                    <meter id="absHum-meter"
                        min="0"
                        max="50">
                    </meter>
                    <span id="absHum-value">
                    </span>
                </div>

                <!-- Pressure -->
                <div class="metric">
                    <span class="label">
                        Pressure
                    </span>
                    <meter id="pres-meter"
                        min="900"
                        max="1100">
                    </meter>
                    <span id="pres-value">
                    </span>
                </div>

                <!-- Wetbulb -->
                <div class="metric">
                    <span class="label">
                        Wetbulb
                    </span>
                    <meter id="wb-meter"
                        min="-20"
                        max="50">
                    </meter>
                    <span id="wb-value">
                    </span>
                </div>
            </div>
        </section>

        <section id="weather-trend"
            hidden>

            <h2 id="trend-title">
                Weather Trend
            </h2>

            <div id="trend-box">
                <svg id="trend-graph"
                    viewBox="0 0 300 150"
                    preserveAspectRatio="none">
                    <line x1="0"
                        y1="150"
                        x2="300"
                        y2="150"
                        stroke="white"
                        stroke-width="1"
                    />
                    <line x1="0"
                        y1="0"
                        x2="0"
                        y2="150"
                        stroke="white"
                        stroke-width="1"
                    />
                    <polyline id="trend-temp"
                        fill="none"
                        stroke="#ff4444"
                        stroke-width="2"
                    />
                    <polyline id="trend-hum"
                        fill="none"
                        stroke="#44aaff"
                        stroke-width="2"
                    />
                </svg>
            </div>
        </section>
    </body>
</html>
